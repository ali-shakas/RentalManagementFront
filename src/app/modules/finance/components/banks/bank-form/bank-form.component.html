<div class="container-fluid">
  <app-page-header
    [title]="'Create Bank' | translate"
    [subtitle]="'Register a bank account and link it to a counting record for fleet payments.' | translate"
  >
    <a class="btn btn-outline-secondary" routerLink="/banks">{{ 'Back to Banks' | translate }}</a>
  </app-page-header>

  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-body">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">{{ 'Counting ID' | translate }} <span class="text-danger">*</span></label>
                <input type="text" class="form-control" formControlName="countingId" />
              </div>

              <div class="col-md-6">
                <label class="form-label">{{ 'FleetId' | translate }} <span class="text-danger">*</span></label>
                <input type="text" class="form-control" formControlName="fleetId" />
              </div>

              <div class="col-md-6">
                <label class="form-label">{{ 'Name' | translate }} <span class="text-danger">*</span></label>
                <input type="text" class="form-control" formControlName="name" />
              </div>

              <div class="col-md-6">
                <label class="form-label">{{ 'Code' | translate }}</label>
                <input type="text" class="form-control" formControlName="code" />
              </div>

              <div class="col-12">
                <label class="form-label">{{ 'Description' | translate }}</label>
                <textarea class="form-control" rows="4" formControlName="description"></textarea>
              </div>
            </div>

            @if (form.invalid && form.touched) {
              <div class="text-danger small mt-3">{{ 'Required field' | translate }}</div>
            }

            <div class="mt-4 d-flex gap-2">
              <button class="btn btn-primary" type="submit" [disabled]="loading() || form.invalid">
                @if (loading()) {
                  <span class="spinner-border spinner-border-sm me-2"></span>
                }
                {{ 'Create' | translate }}
              </button>
              <a class="btn btn-outline-secondary" routerLink="/banks">{{ 'Cancel' | translate }}</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
