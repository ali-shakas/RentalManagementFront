<app-finance-list-shell
  [title]="'Payment Counts'"
  [subtitle]="'Review payment operations tied to bookings, branches, and collection channels.'"
  [columns]="columns"
  [rows]="rows()"
  [loading]="loading()"
  [error]="loadError()"
  [count]="totalCount()"
  [pageNumber]="pageNumber()"
  [totalPages]="totalPages()"
  [pageSize]="pageSize()"
  [showPageSize]="true"
  [enableSearch]="true"
  [searchValue]="search()"
  [searchPlaceholder]="'Search by voucher number, customer, vehicle, or booking'"
  [enableSorting]="true"
  [orderByValue]="orderBy()"
  [orderByDirectionValue]="orderByDirection()"
  [orderByOptions]="orderByOptions"
  (searchChange)="onSearchChange($event)"
  (orderByChange)="onOrderByChange($event)"
  (orderByDirectionChange)="onOrderByDirectionChange($event)"
  (pageChange)="onPageChange($event)"
  (pageSizeChange)="onPageSizeChange($event)"
  [createLink]="'/payment-counts/create'"
  [createLabel]="'Create Payment Count'"
>
  <div finance-extra-filters class="app-filter-field app-filter-field--narrow">
    <label class="app-filter-label">{{ 'Bond Type' | translate }}</label>
    <app-smooth-select
      [ariaLabel]="'Bond Type' | translate"
      [placeholder]="'All bond types' | translate"
      [options]="bondTypeFilterOptions"
      [value]="bondTypeFilter()"
      (valueChange)="onBondTypeFilterChange($any($event))"
    />
  </div>

  <div finance-extra-filters class="app-filter-field app-filter-field--narrow">
    <label class="app-filter-label">{{ 'Payment Type' | translate }}</label>
    <app-smooth-select
      [ariaLabel]="'Payment Type' | translate"
      [placeholder]="'All payment types' | translate"
      [options]="paymentTypeFilterOptions"
      [value]="paymentTypeFilter()"
      (valueChange)="onPaymentTypeFilterChange($any($event))"
    />
  </div>

  <div finance-extra-filters class="app-filter-field app-filter-field--narrow">
    <label class="app-filter-label">{{ 'Branch' | translate }}</label>
    <app-smooth-select
      [ariaLabel]="'Branch' | translate"
      [placeholder]="'All branches' | translate"
      [options]="branchFilterOptions()"
      [value]="branchFilter()"
      (valueChange)="onBranchFilterChange($any($event))"
    />
  </div>
</app-finance-list-shell>
