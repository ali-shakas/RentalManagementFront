<div class="container-fluid">
  <app-page-header
    [title]="'Create Financial Year' | translate"
    [subtitle]="'Register a fiscal period used by journals and payment operations.' | translate"
  >
    <a class="btn btn-outline-secondary" routerLink="/financial-years">{{ 'Back to Financial Years' | translate }}</a>
  </app-page-header>

  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-body">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">{{ 'Year Number' | translate }} <span class="text-danger">*</span></label>
                <input type="number" class="form-control" formControlName="financialYearNumber" />
              </div>

              <div class="col-md-8">
                <label class="form-label">{{ 'Name' | translate }} <span class="text-danger">*</span></label>
                <input type="text" class="form-control" formControlName="name" />
              </div>

              <div class="col-md-6">
                <app-date-picker formControlName="startDate" label="Start Date" />
              </div>

              <div class="col-md-6">
                <app-date-picker formControlName="endDate" label="End Date" />
              </div>

              <div class="col-md-6 d-flex align-items-end">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="isCurrentYear" formControlName="isCurrentYear" />
                  <label class="form-check-label" for="isCurrentYear">{{ 'Current Year' | translate }}</label>
                </div>
              </div>
            </div>

            @if (form.invalid && form.touched) {
              <div class="text-danger small mt-3">{{ 'Required field' | translate }}</div>
            }

            <div class="app-form-actions">
              <button class="btn btn-primary" type="submit" [disabled]="loading() || form.invalid">
                @if (loading()) {
                  <span class="spinner-border spinner-border-sm me-2"></span>
                }
                {{ 'Create' | translate }}
              </button>
              <a class="btn btn-cancel" routerLink="/financial-years">{{ 'Cancel' | translate }}</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
