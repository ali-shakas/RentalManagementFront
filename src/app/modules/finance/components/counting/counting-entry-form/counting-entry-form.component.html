<div class="container-fluid">
  <app-page-header
    [title]="'Create Counting Entry' | translate"
    [subtitle]="'Add an account to the reporting hierarchy with its operational balance.' | translate"
  >
    <a class="btn btn-outline-secondary" routerLink="/counting">{{ 'Back to Chart of Accounts' | translate }}</a>
  </app-page-header>

  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-body">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">{{ 'Counting Number' | translate }} <span class="text-danger">*</span></label>
                <input type="number" class="form-control" formControlName="countingNumber" />
              </div>
              <div class="col-md-4">
                <label class="form-label">{{ 'Main Counting Number' | translate }} <span class="text-danger">*</span></label>
                <input type="number" class="form-control" formControlName="countingMain" />
              </div>
              <div class="col-md-4">
                <label class="form-label">{{ 'Counting Type' | translate }} <span class="text-danger">*</span></label>
                <input type="number" class="form-control" formControlName="countingType" />
              </div>

              <div class="col-md-4">
                <label class="form-label">{{ 'Report Number' | translate }} <span class="text-danger">*</span></label>
                <input type="number" class="form-control" formControlName="reportNumber" />
              </div>
              <div class="col-md-4">
                <label class="form-label">{{ 'Account Level' | translate }} <span class="text-danger">*</span></label>
                <input type="number" class="form-control" formControlName="countingLevel" />
              </div>
              <div class="col-md-4">
                <label class="form-label">{{ 'Balance' | translate }} <span class="text-danger">*</span></label>
                <input type="number" class="form-control" formControlName="balannce" />
              </div>

              <div class="col-md-6">
                <label class="form-label">{{ 'Name (AR)' | translate }} <span class="text-danger">*</span></label>
                <input type="text" class="form-control" formControlName="nameAr" />
              </div>
              <div class="col-md-6">
                <label class="form-label">{{ 'Name (EN)' | translate }}</label>
                <input type="text" class="form-control" formControlName="nameEn" />
              </div>

              <div class="col-md-6">
                <label class="form-label">{{ 'FleetId' | translate }} <span class="text-danger">*</span></label>
                <input type="text" class="form-control" formControlName="fleetId" />
              </div>
            </div>

            @if (form.invalid && form.touched) {
              <div class="text-danger small mt-3">{{ 'Required field' | translate }}</div>
            }

            <div class="mt-4 d-flex gap-2">
              <button class="btn btn-primary" type="submit" [disabled]="loading() || form.invalid">
                @if (loading()) {
                  <span class="spinner-border spinner-border-sm me-2"></span>
                }
                {{ 'Create' | translate }}
              </button>
              <a class="btn btn-outline-secondary" routerLink="/counting">{{ 'Cancel' | translate }}</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
