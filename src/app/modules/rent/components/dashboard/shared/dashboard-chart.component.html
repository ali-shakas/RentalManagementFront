<section class="dashboard-widget">
  <header class="dashboard-widget__header">
    <h3>{{ title | translate }}</h3>
    @if (subtitle.trim()) {
      <p>{{ subtitle | translate }}</p>
    }
  </header>

  @if (loading) {
    <div class="skeleton skeleton--chart"></div>
  } @else if (showChartFallback()) {
    <div class="dashboard-widget__fallback" role="status">
      {{ 'DashboardChartLoadFromExistingGift' | translate }}
    </div>
  } @else {
    <div class="dashboard-widget__chart">
      <canvas #canvasRef></canvas>
    </div>
  }
</section>
