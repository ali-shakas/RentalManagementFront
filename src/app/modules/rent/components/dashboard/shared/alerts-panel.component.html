<section class="dashboard-widget">
  <header class="dashboard-widget__header">
    <h3>{{ title | translate }}</h3>
    <p>{{ subtitle | translate }}</p>
  </header>

  @if (loading) {
    <div class="skeleton skeleton--alerts"></div>
  } @else {
    <div class="alerts-list">
      @for (alert of alerts; track $index) {
        <article class="alert-item" [attr.data-tone]="alert.type">
          <h4>{{ alert.title | translate }}</h4>
          <p>{{ alert.description | translate }}</p>
        </article>
      } @empty {
        <p class="text-muted mb-0">{{ 'No records found' | translate }}</p>
      }
    </div>
  }
</section>
