<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header pb-0 d-flex justify-content-between align-items-center">
          <div>
            <h3>User Privileges</h3>
            <span>{{ user()?.userName ?? 'Loading...' }}</span>
          </div>
          <div>
            <button class="btn btn-primary me-2" (click)="save()" [disabled]="loading()">
              Save
            </button>
            <a class="btn btn-cancel" routerLink="/users">Back to Users</a>
          </div>
        </div>
        <div class="card-body">
          <div class="row">
            @for (priv of privileges(); track priv.id) {
              <div class="col-md-4 col-lg-3 mb-2">
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    [id]="'priv-' + priv.id"
                    [checked]="isSelected(priv.id)"
                    (change)="toggle(priv.id)"
                  />
                  <label class="form-check-label" [for]="'priv-' + priv.id">
                    {{ priv.privilegeName || priv.displayName || priv.displayNameEn || priv.nameEn || priv.name || priv.id }}
                  </label>
                </div>
              </div>
            }
          </div>
          @if (privileges().length === 0) {
            <p class="text-muted">No privileges defined.</p>
          }
        </div>
      </div>
    </div>
  </div>
</div>
