<div class="auth-wrapper">
  <div class="auth-content">
    <div class="card">
      <div class="card-body">
        <h4 class="mb-4">إدخال رمز التحقق</h4>
        <form [formGroup]="form">
          <div class="mb-3">
            <label class="form-label">الرمز</label>
            <input type="text" class="form-control" formControlName="code" />
          </div>
          <button type="submit" class="btn btn-primary w-100">تأكيد</button>
          <div class="mt-3 text-center">
            <a routerLink="/auth/login">العودة لتسجيل الدخول</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
