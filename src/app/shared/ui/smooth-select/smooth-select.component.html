<div
  class="app-soft-select"
  [class.app-soft-select--open]="isOpen()"
  [class.app-soft-select--disabled]="isDisabled()"
>
  <button
    #triggerBtn
    type="button"
    class="app-soft-select__trigger"
    [attr.aria-label]="ariaLabel"
    [attr.aria-expanded]="isOpen()"
    aria-haspopup="listbox"
    [disabled]="isDisabled()"
    (click)="toggle()"
  >
    <span class="app-soft-select__label">{{ selectedLabel() }}</span>
    <i class="fa fa-angle-down app-soft-select__caret" aria-hidden="true"></i>
  </button>

  @if (isOpen()) {
    <div class="app-soft-select__menu" role="listbox" [ngStyle]="menuStyles()">
      @if (searchable) {
        <div class="app-soft-select__search-wrap" (click)="$event.stopPropagation()">
          <input
            type="text"
            class="app-soft-select__search"
            [placeholder]="searchPlaceholder | translate"
            [value]="searchTerm()"
            (input)="onSearchInput(($any($event.target).value || '').toString())"
          />
        </div>
      }
      @for (option of filteredOptions(); track $index) {
        <button
          type="button"
          class="app-soft-select__option"
          role="option"
          [attr.aria-selected]="isSelected(option.value)"
          [class.is-selected]="isSelected(option.value)"
          (click)="selectOption(option.value, $event)"
        >
          <span>{{ optionLabelText(option) }}</span>
          @if (isSelected(option.value)) {
            <i class="fa fa-check" aria-hidden="true"></i>
          }
        </button>
      }
      @if (filteredOptions().length === 0) {
        <div class="app-soft-select__empty">{{ 'No records found' | translate }}</div>
      }
    </div>
  }
</div>
