<div
  class="app-soft-select"
  [class.app-soft-select--open]="isOpen()"
  [class.app-soft-select--disabled]="isDisabled()"
>
  <button
    type="button"
    class="app-soft-select__trigger"
    [attr.aria-label]="ariaLabel"
    [attr.aria-expanded]="isOpen()"
    aria-haspopup="listbox"
    [disabled]="isDisabled()"
    (click)="toggle($event)"
  >
    <span class="app-soft-select__label">{{ selectedLabel() | translate }}</span>
    <i class="fa fa-angle-down app-soft-select__caret" aria-hidden="true"></i>
  </button>

  @if (isOpen()) {
    <div class="app-soft-select__menu" role="listbox" [style.max-height.px]="menuMaxHeight">
      @for (option of options; track option.label + ':' + option.value) {
        <button
          type="button"
          class="app-soft-select__option"
          role="option"
          [attr.aria-selected]="isSelected(option.value)"
          [class.is-selected]="isSelected(option.value)"
          (click)="selectOption(option.value, $event)"
        >
          <span>{{ option.label | translate }}</span>
          @if (isSelected(option.value)) {
            <i class="fa fa-check" aria-hidden="true"></i>
          }
        </button>
      }
    </div>
  }
</div>
