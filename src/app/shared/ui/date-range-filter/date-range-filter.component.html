<div class="app-date-range-filter">
  <div class="app-filter-field app-filter-field--date">
    <label class="app-filter-label">{{ fromLabel | translate }}</label>
    <input
      type="date"
      class="form-control"
      [ngModel]="from"
      [placeholder]="fromPlaceholder | translate"
      [disabled]="disabled"
      (ngModelChange)="onFromChange($event)"
    />
  </div>

  <div class="app-filter-field app-filter-field--date">
    <label class="app-filter-label">{{ toLabel | translate }}</label>
    <input
      type="date"
      class="form-control"
      [ngModel]="to"
      [placeholder]="toPlaceholder | translate"
      [disabled]="disabled"
      (ngModelChange)="onToChange($event)"
    />
  </div>
</div>
