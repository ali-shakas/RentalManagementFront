<div class="d-flex align-items-center profile-media">
  <img
    class="b-r-10 img-40"
    [src]="avatarUrl()"
    [alt]="displayName()"
    (error)="onAvatarError($event)"
  />
  <div class="flex-grow-1">
    <span>{{ displayName() }}</span>
    <p class="mb-0">
      {{ primaryRole() }}
      <i class="middle fa fa-angle-down"></i>
    </p>
  </div>
</div>
<ul class="profile-dropdown onhover-show-div">
  <li>
    <a href="javascript:void(0)"> <app-feathericon [icon]="'user'" /><span>Account </span> </a>
  </li>
  <li>
    <a href="javascript:void(0)"> <app-feathericon [icon]="'mail'" /><span>Inbox</span> </a>
  </li>
  <li>
    <a href="javascript:void(0)">
      <app-feathericon [icon]="'file-text'" />
      <span>Taskboard</span>
    </a>
  </li>
  <li>
    <a href="javascript:void(0)">
      <app-feathericon [icon]="'settings'" />
      <span>Settings</span>
    </a>
  </li>
  <li>
    <a href="javascript:void(0)" (click)="logout()">
      <app-feathericon [icon]="'log-out'" />
      <span>Log out</span>
    </a>
  </li>
</ul>
