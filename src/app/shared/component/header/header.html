<div [ngClass]="navmenu.isDisplay ? 'page-header close_icon':'page-header'">
  <div class="header-wrapper row m-0">
    <div class="header-logo-wrapper col-auto p-0">
      <button
        type="button"
        class="toggle-sidebar"
        (click)="openMenu()"
        [attr.data-state]="navmenu.isDisplay ? 'collapsed' : 'expanded'"
        [attr.aria-controls]="'pageWrapper'"
        [attr.aria-label]="navmenu.isDisplay ? 'Open sidebar' : 'Collapse sidebar'"
        [attr.title]="navmenu.isDisplay ? 'Open sidebar' : 'Collapse sidebar'"
      >
        <svg class="sidebar-toggle">
          <use href="assets/svg/icon-sprite.svg#stroke-animation"></use>
        </svg>
      </button>
      <div
        class="modern-date-widget header-datetime-panel"
        [attr.dir]="isArabicLanguage ? 'rtl' : 'ltr'"
        aria-live="polite"
      >
        <div class="time-box">
          <span class="time">{{ time12 }}</span>
        </div>
        <div class="date-box">
          <div class="date-row">
            <span class="badge">{{ isArabicLanguage ? 'ميلادي' : 'Gregorian' }}</span>
            <span class="date-row-text">
              <span [hidden]="!isArabicLanguage">{{ gregorianDate }}</span>
              <span class="date-row-text--numeric">{{ gregorianNumericDate }}</span>
            </span>
          </div>
          <div class="date-row muted">
            <span class="badge hijri">{{ isArabicLanguage ? 'هجري' : 'Hijri' }}</span>
            <span class="date-row-text">
              <span [hidden]="!isArabicLanguage">{{ hijriDate }}</span>
              <span class="date-row-text--numeric">{{ hijriNumericDate }}</span>
            </span>
          </div>
        </div>
      </div>
    </div>
    <div
      class="nav-right col-auto pull-right right-header p-0 ms-auto"
    >
      <ul class="nav-menus">
        <li class="notification-nav onhover-dropdown">
          <app-notification />
        </li>
        <li class="theme-nav">
          <app-theme />
        </li>
        <li class="language-nav">
          <app-language />
        </li>
        <li class="profile-nav p-0">
          <app-profile />
        </li>
      </ul>
    </div>
  </div>
</div>
