<footer class="footer">
  <div class="container-fluid">
    <div class="footer-shell">
      <div class="footer-copyright">
        <div class="footer-brand">
          <span class="footer-logo-wrap" aria-hidden="true">
            <img src="assets/images/logo/logo-icon.png" [alt]="'Footer.SystemName' | translate" height="24" />
          </span>
          <div class="footer-copy">
            <p class="mb-0">{{ 'Footer.SystemName' | translate }}</p>
            <span>{{ 'Footer.Copyright' | translate }} {{ year }} ©</span>
          </div>
        </div>
      </div>
      <div class="footer-meta" aria-hidden="true">
        <span class="footer-meta-line"></span>
        <span class="footer-meta-dot"></span>
      </div>
    </div>
  </div>
</footer>
