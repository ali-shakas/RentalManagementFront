<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="icon" type="image/png" href="/assets/images/logo/logo-icon.png" />
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; direction: rtl; color: #1f2937; }
    h2, h3, p { margin: 0; }
    h3 { font-size: 18px; margin-bottom: 10px; }
    p { margin-bottom: 5px; }
    p:last-child { margin-bottom: 20px; }
    .my-table { width: 100%; table-layout: fixed; }
    .my-table th, .my-table td {
      padding: 8px 10px;
      text-align: center;
      border: none;
      vertical-align: middle;
      line-height: 1.7;
      font-size: 14px;
    }
    .my-table th { background-color: #f2f2f2; }
    .my-table td:nth-child(1), .my-table td:nth-child(3) { width: 30%; }
    .my-table td:nth-child(2) { width: 40%; }
    .mtable { width: 100%; margin: 20px 0; table-layout: fixed; }
    .mtable td {
      padding: 6px 6px;
      font-size: 14px;
      line-height: 1.6;
      vertical-align: middle;
    }
    .mtable td:nth-child(1),
    .mtable td:nth-child(2),
    .mtable td:nth-child(3) { width: 33.333%; }
    .mtable td:nth-child(1) { text-align: right; }
    .mtable td:nth-child(2) { text-align: center; }
    .mtable td:nth-child(3) { text-align: left; direction: rtl; }
    .voucher-head-cell { vertical-align: middle; }
    .voucher-head-block {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid #dde3f8;
      background: #f8faff;
      border-radius: 12px;
      padding: 8px 10px;
      width: 100%;
      box-sizing: border-box;
      min-height: 46px;
    }
    .voucher-head-label {
      font-weight: 700;
      color: #4b5563;
      font-size: 13px;
    }
    .voucher-title-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 10px 18px;
      border-radius: 14px;
      background: linear-gradient(135deg, #eef2ff 0%, #f8faff 100%);
      border: 1px solid #dbe4ff;
      box-sizing: border-box;
      min-height: 46px;
    }
    .voucher-title {
      margin: 0;
      font-size: 34px;
      font-weight: 700;
      color: #1f2c7a;
    }
    .metric-badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #2d3a8c;
      font-weight: 700;
      border: 1px solid #d6ddff;
    }
    .metric-badge--date {
      background: #f3f4f6;
      color: #374151;
      border-color: #e5e7eb;
      direction: rtl;
    }
    .header-column { width: 30%; }
    .rtl { direction: rtl; text-align: right !important; }
    .ltr { direction: ltr; text-align: left !important; }
    .header { font-weight: 600; }
    .label-ar {
      display: block;
      direction: rtl;
      text-align: right;
      font-weight: 700;
      color: #1f2937;
    }
    .label-en {
      display: block;
      direction: ltr;
      text-align: left;
      color: #4b5563;
      font-weight: 600;
      font-size: 13px;
      margin-top: 2px;
    }
    .field-label-ar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      direction: rtl;
      text-align: center;
      font-weight: 700;
      color: #1e3a8a;
      font-size: 13px;
      line-height: 1.4;
      background: #eaf0ff;
      border: 1px solid #c8d6ff;
      border-radius: 0;
      padding: 7px 10px;
      min-height: 36px;
      width: 100%;
      position: relative;
      box-sizing: border-box;
    }
    .field-label-en {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      direction: ltr;
      text-align: center;
      color: #334155;
      font-weight: 600;
      font-size: 12px;
      line-height: 1.4;
      background: #eaf0ff;
      border: 1px solid #c8d6ff;
      border-radius: 0;
      padding: 7px 10px;
      min-height: 36px;
      width: 100%;
      position: relative;
      box-sizing: border-box;
    }
    .field-label-ar::before,
    .field-label-en::before {
      content: "";
      position: absolute;
      top: 50%;
      width: 12px;
      border-top: 1px solid #cbd5e1;
      transform: translateY(-50%);
    }
    .field-label-ar::before {
      left: -12px;
    }
    .field-label-en::before {
      right: -12px;
    }
    .field-value {
      display: block;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      font-weight: 700;
      color: #111827;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 0;
      padding: 7px 10px;
      min-height: 36px;
      line-height: 1.4;
    }
    .field-row td {
      padding: 0 !important;
      border: 0;
    }
    .field-row td:nth-child(1) .field-label-ar {
      border-radius: 10px 0 0 10px;
      border-right: 0;
    }
    .field-row td:nth-child(2) .field-value {
      border-radius: 0;
    }
    .field-row td:nth-child(3) .field-label-en {
      border-radius: 0 10px 10px 0;
      border-left: 0;
    }
    .footer { text-align: center; margin-top: 20px; }
    .doc-header td { vertical-align: top; line-height: 1.6; }
    .doc-header td:first-child { text-align: right; }
    .doc-header td:nth-child(2) { text-align: center; }
    .doc-header td:last-child { text-align: left; direction: ltr; }
    .header-meta {
      text-align: center !important;
      font-size: 14px;
      line-height: 1.8;
    }
    .preview-banner {
      margin: 8px auto 14px;
      width: fit-content;
      padding: 6px 18px;
      border-radius: 999px;
      border: 1px solid #d7dbe7;
      background: #f8faff;
      color: #1f2c7a;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.2px;
      text-align: center;
    }
    .section-box {
      border: 1px solid #d7dbe7;
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 10px;
      background: #fff;
    }
    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: #434ea9;
      margin-bottom: 6px;
    }
    .voucher-note {
      margin-top: 10px;
      line-height: 1.9;
      font-size: 14px;
      border: 1px dashed #cfd6ea;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fcfdff;
    }
    .note-title {
      display: inline-block;
      font-weight: 700;
      color: #434ea9;
      margin-left: 8px;
    }
    .signatures-wrap {
      margin-top: 18px;
      border: 1px solid #e4e7f2;
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
    }
    .signatures-wrap .my-table td {
      padding-top: 10px;
      padding-bottom: 10px;
    }
    .signatures-wrap .my-table tr:first-child td {
      border-bottom: 1px solid #eef2ff;
    }
    .sig-title-ar {
      display: block;
      direction: rtl;
      text-align: right;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 2px;
    }
    .sig-title-en {
      display: block;
      direction: ltr;
      text-align: left;
      color: #374151;
      font-weight: 600;
      font-size: 13px;
    }
    .sign-line {
      display: block;
      width: 88%;
      margin: 0 auto;
      border-top: 1px dashed #9ca3af;
      height: 1px;
    }
    .voucher-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .voucher-main {
      flex: 1 1 auto;
    }
    .voucher-tail {
      margin-top: auto;
    }
    .journal-print-page {
      min-height: calc(297mm - 14mm);
      display: flex;
      flex-direction: column;
    }
    .journal-print-tail {
      margin-top: auto;
      padding-top: 3mm;
      break-inside: avoid;
      page-break-inside: avoid;
      break-before: avoid-page;
      page-break-before: auto;
    }
    .journal-page-break {
      page-break-after: always;
      break-after: page;
    }
    .journal-page-break:last-child {
      page-break-after: auto;
      break-after: auto;
    }
    .journal-meta-grid {
      margin-top: 8px;
    }
    .journal-meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 18px;
      align-items: stretch;
      padding: 10px 12px;
      border: 1px solid #d5def5;
      border-radius: 8px;
      background: #f8faff;
      margin-bottom: 10px;
      justify-content: space-between;
    }
    .journal-meta-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      line-height: 1.4;
      color: #0f172a;
      font-weight: 700;
      min-width: 320px;
      flex: 1 1 320px;
      padding: 6px 10px;
      background: #ffffff;
      border: 1px solid #dbe4f6;
      border-radius: 8px;
    }
    .journal-meta-item .label {
      color: #334155;
      font-weight: 700;
      white-space: nowrap;
    }
    .journal-meta-item .value {
      color: #0b1324;
      font-weight: 800;
      white-space: nowrap;
    }
    .journal-total-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-top: 6px;
      align-items: center;
    }
    .journal-total-grid .journal-meta-card {
      padding: 5px 12px;
      border-style: solid;
      border-color: #cdd8f6;
      background: #f8faff;
    }
    .journal-total-grid .journal-meta-title-ar {
      font-size: 13px;
    }
    .journal-total-grid .journal-meta-title-en {
      font-size: 12px;
      color: #64748b;
    }
    .journal-total-grid .journal-meta-value {
      font-size: 16px;
      font-weight: 800;
    }
    .journal-total-equation {
      margin-top: 8px;
      padding: 10px 14px;
      border: 1px solid #cdd8f6;
      border-radius: 10px;
      background: linear-gradient(180deg, #f8faff 0%, #ffffff 100%);
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: 0.2px;
    }
    .journal-total-equation .k {
      color: #334155;
      font-size: 13px;
      font-weight: 700;
      margin: 0 4px;
    }
    .journal-total-equation .v {
      color: #0b1324;
      margin: 0 4px;
    }
    .journal-total-equation .op {
      color: #475569;
      margin: 0 6px;
    }
    .journal-details-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
      margin-top: 6px;
      border: 1px solid #d9e1f2;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .journal-details-table th,
    .journal-details-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #e8edf8;
      font-size: 12px;
      line-height: 1.45;
      vertical-align: top;
    }
    .journal-details-table th {
      background: #eef3ff;
      color: #243b86;
      font-weight: 800;
      text-align: center;
      font-size: 11px;
    }
    .journal-details-table tr:last-child td {
      border-bottom: 0;
    }
    .journal-details-table thead {
      display: table-header-group;
    }
    .journal-details-table tfoot {
      display: table-footer-group;
    }
    .journal-details-table tr {
      break-inside: avoid-page;
      page-break-inside: avoid;
    }
    .journal-details-table td:nth-child(1),
    .journal-details-table td:nth-child(3),
    .journal-details-table td:nth-child(4) {
      text-align: center;
      font-weight: 700;
      color: #1f2937;
      white-space: nowrap;
    }
    .journal-details-table td:nth-child(2) {
      text-align: right;
      direction: rtl;
      font-weight: 700;
    }
    .journal-details-table td:nth-child(5) {
      text-align: right;
      direction: rtl;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
      color: #334155;
    }
    .journal-paper {
      border: 0.45mm solid #111827;
      padding: 7mm 6mm 6mm;
      background: #fff;
      box-sizing: border-box;
    }
    .journal-paper-title {
      text-align: center;
      font-size: 30px;
      font-weight: 800;
      margin: 4px 0 8px;
      color: #0b1324;
      letter-spacing: 0.6px;
    }
    .journal-top-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2.5mm;
      margin-bottom: 2.5mm;
      align-items: stretch;
    }
    .journal-top-box {
      border: 0.35mm solid #111827;
      padding: 0;
      background: #fff;
      display: flex;
    }
    .journal-paper-head {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 0;
      table-layout: fixed;
    }
    .journal-paper-head td {
      border: 0.3mm solid #111827;
      padding: 1.3mm 1.7mm;
      font-size: 11.5px;
      vertical-align: middle;
      line-height: 1.25;
    }
    .journal-paper-head .k {
      font-weight: 700;
      background: #f2f5fb;
      white-space: nowrap;
      text-align: center;
    }
    .journal-paper-head .v {
      font-weight: 700;
      min-width: 96px;
      text-align: center;
      direction: ltr;
      unicode-bidi: plaintext;
      font-variant-numeric: tabular-nums;
    }
    .journal-paper-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      margin-top: 2mm;
      border: 0.3mm solid #111827;
    }
    .journal-paper-table thead {
      display: table-header-group;
    }
    .journal-paper-table tfoot {
      display: table-footer-group;
    }
    .journal-paper-table tr {
      break-inside: avoid-page;
      page-break-inside: avoid;
    }
    .journal-paper-table th,
    .journal-paper-table td {
      border-left: 0.3mm solid #111827;
      border-right: 0.3mm solid #111827;
      border-top: 0;
      border-bottom: 0;
      padding: 1.2mm 1.5mm;
      font-size: 11px;
      vertical-align: top;
    }
    .journal-paper-table th {
      text-align: center;
      font-weight: 800;
      background: #eef2f9;
      height: 7.5mm;
      border-bottom: 0.3mm solid #111827;
    }
    .journal-paper-table td {
      height: 6.5mm;
    }
    .journal-paper-table td:nth-child(1),
    .journal-paper-table td:nth-child(2),
    .journal-paper-table td:nth-child(5),
    .journal-paper-table td:nth-child(6) {
      text-align: center;
      white-space: nowrap;
    }
    .journal-paper-table td:nth-child(3),
    .journal-paper-table td:nth-child(4) {
      text-align: right;
      direction: rtl;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .journal-paper-summary {
      width: 100%;
      border-collapse: collapse;
      margin-top: -0.3mm;
      border-top: 0.5mm solid #111827;
      break-inside: avoid;
      page-break-inside: avoid;
    }
    .journal-paper-summary td {
      border: 0.3mm solid #111827;
      padding: 1.4mm 1.8mm;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      background: #f8fafc;
    }
    .journal-paper-summary .k {
      background: #eef2f9;
      font-weight: 800;
      white-space: nowrap;
    }
    .journal-paper-summary .v {
      font-weight: 800;
      white-space: nowrap;
    }
    .booking-print-page {
      width: 100%;
      min-height: calc(100vh - 24px);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
    .booking-print-main {
      flex: 1 1 auto;
      min-height: 0;
    }
    .booking-print-footer {
      margin-top: auto;
      flex-shrink: 0;
      padding-top: 10px;
      break-inside: avoid;
      page-break-inside: avoid;
    }
    /* ذيل صفحة الإيصال — صناديق ذهبية، خطوط منقطة، شريط بنفسجي */
    .booking-receipt-tail {
      box-sizing: border-box;
      border: 1px solid #0a0a0a;
      border-radius: 2px;
      padding: 5px 6px 0;
      background: #fff;
    }
    .booking-receipt-head {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: nowrap;
      margin-bottom: 5px;
      padding-bottom: 4px;
      border-bottom: 1px solid #e5e5e5;
      position: relative;
    }
    .booking-receipt-head-dates {
      flex: 1 1 auto;
      min-width: 0;
    }
    .booking-receipt-title {
      font-size: 8px;
      font-weight: 800;
      text-align: right;
      margin-bottom: 2px;
    }
    .booking-receipt-dates-row {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 6px;
      flex-wrap: wrap;
    }
    .booking-receipt-hijri,
    .booking-receipt-greg {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 3px;
      font-size: 7px;
      font-weight: 700;
    }
    .booking-receipt-gold {
      box-sizing: border-box;
      border: 2px solid #c9a227;
      border-radius: 3px;
      background: #fffef3;
      min-height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1px 4px;
      font-size: 7.5px;
      font-weight: 800;
      color: #1a1a1a;
    }
    .booking-receipt-gold--hijri {
      min-width: 32px;
      min-height: 16px;
      padding: 1px 3px;
    }
    .booking-receipt-gold--greg {
      min-width: 92px;
      min-height: 18px;
    }
    .booking-receipt-amount-block {
      flex: 0 0 auto;
      text-align: center;
    }
    .booking-receipt-sr-label {
      font-size: 7.5px;
      font-weight: 800;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }
    .booking-receipt-voucher-no {
      font-size: 7px;
      font-weight: 700;
      color: #374151;
    }
    .booking-receipt-voucher-center {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translate(-50%, 15px);
      font-size: 8px;
      font-weight: 800;
      color: #111827;
      white-space: nowrap;
      text-align: center;
      background: #fff;
      padding: 0 6px;
      border-radius: 8px;
    }
    .booking-receipt-gold--sr {
      min-width: 72px;
      min-height: 22px;
    }
    .booking-receipt-moafiq {
      flex: 0 0 auto;
      font-size: 8px;
      font-weight: 800;
      padding: 0 2px 2px;
      align-self: center;
    }
    .booking-receipt-mid {
      margin: 4px 0 5px;
    }
    .booking-receipt-mid-line {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2px;
      margin: 3px 0;
      font-size: 7.5px;
      font-weight: 700;
    }
    .booking-receipt-mid-line .lbl-en {
      flex: 0 0 auto;
      direction: ltr;
      text-align: left;
      white-space: nowrap;
    }
    .booking-receipt-mid-line .lbl-ar {
      flex: 0 0 auto;
      direction: rtl;
      text-align: right;
      white-space: nowrap;
    }
    .booking-receipt-mid-line .fill {
      flex: 1 1 auto;
      display: flex;
      align-items: flex-end;
      border-bottom: 1px dotted #000;
      min-width: 230px;
      min-height: 22px;
      text-align: right;
      direction: rtl;
      font-size: 8.5px;
      font-weight: 1000;
      line-height: 1;
      padding: 0 4px 0;
    }
    .booking-receipt-sigs {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 8px;
      margin: 6px 0 4px;
      padding-top: 4px;
      border-top: 1px solid #ddd;
    }
    .booking-receipt-sig {
      flex: 1 1 33%;
      text-align: center;
      font-size: 7px;
      font-weight: 800;
    }
    .booking-receipt-sig .ar {
      display: block;
      direction: rtl;
    }
    .booking-receipt-sig .en {
      display: block;
      direction: ltr;
      font-size: 6.5px;
      color: #374151;
      margin-top: 1px;
    }
    .booking-receipt-sig .sig-dots {
      margin-top: 4px;
      border-bottom: 1px dotted #000;
      min-height: 14px;
    }
    .booking-receipt-footer-bar {
      margin: 5px -6px 0;
      padding: 4px 6px 5px;
      box-sizing: border-box;
      border: 1px solid #4338ca;
      border-bottom-left-radius: 2px;
      border-bottom-right-radius: 2px;
      background: linear-gradient(180deg, #eceaff 0%, #e6e6fa 55%, #dfe2fb 100%);
      text-align: center;
    }
    .booking-receipt-footer-bar .ln-ar {
      font-size: 7px;
      font-weight: 700;
      line-height: 1.35;
      color: #312e81;
      direction: rtl;

  <script>

          payload = null;

      const get = (k, fallback = '') => {

        return params.get(k) || fallback;

      const show = (v) => {
        const text = String(v ?? '').trim();

      const esc = (v) => String(v ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
      const num = (v) => (v === null || v === undefined || v === '' ? '' : v);

      const dir = get('dir', 'rtl').toLowerCase() === 'ltr' ? 'ltr' : 'rtl';
      document.documentElement.setAttribute('dir', dir);
      document.body.style.direction = dir;
      const isPrintMode = get('autoPrint', '0') === '1';
      if (isPrintMode) {
        document.title = '';

      const template = get('template', 'generic');
      if (template === 'voucher' && root) {
        const voucherDocNo = show(get('documentNo', '-'));

        const personTitleEn = bondType === 1 ? 'Received from' : 'Pay To';
        const paymentMethodAr =
          paymentType === 1 ? 'نقدًا' :
          paymentType === 2 ? 'شبكة' :
          paymentType === 3 ? 'شيك' :
          paymentType === 4 ? 'تحويل بنكي' :
          paymentType === 5 ? ' نقداً/بنكي' : '';
        const status = Number(get('status', '0'));
        const normalizeDate = (raw) => {
          const text = String(raw ?? '').trim();
          if (!text) return '';
          const parsed = new Date(text);
          if (!Number.isNaN(parsed.getTime())) {
            const pad = (n) => String(n).padStart(2, '0');
            const day = pad(parsed.getDate());
            const month = pad(parsed.getMonth() + 1);
            const year = parsed.getFullYear();
            return `${day}/${month}/${year}`;
          }
          return text.split(' ')[0] || text;
        };
        const dateValue = esc(show(normalizeDate(get('date', get('printDate', '')))));
        const customer = esc(show(get('customer', '')));
        const paidString = esc(show(get('paidString', '')));
        const operationNumber = esc(show(get('operationNumber', '')));
        const bankName = esc(show(get('bankName', '')));

        const vehicleCategory = esc(show(get('vehicleCategory', '')));
        const plateNumber = esc(show(get('plateNumber', '')));

      } else if (template === 'journal' && root) {

                <div>${esc(get('printDateLabel', 'Print Date'))}: ${esc(get('printDate', new Date().toLocaleString()))}</div>
                <div>${esc(get('branchLabel', 'Branch'))}: ${esc(get('branchName', '-'))}</div>
                <div>${esc(get('docNoLabel', 'Document No.'))}: ${esc(get('documentNo', '-'))}</div>
              </div>
            </div>
            <h2 style="margin:0 0 12px;font-size:20px;">${esc(get('title', 'Document'))}</h2>
            ${decodedContent}
          </div>
        `;
      }

      const autoPrint = get('autoPrint', '0') === '1';
      if (autoPrint) {
        const triggerPrint = () => {
          window.focus();
          window.print();
        };

        if (document.readyState === 'complete') {
          setTimeout(triggerPrint, 150);
        } else {
          window.addEventListener('load', () => setTimeout(triggerPrint, 150), { once: true });
        }

        window.addEventListener('afterprint', () => {
          setTimeout(() => window.close(), 120);
        }, { once: true });
      }
    })();
  </script>
</body>
</html>
